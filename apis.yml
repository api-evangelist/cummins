aid: cummins
name: Cummins
description: >-
  Cummins is a global power leader that designs, manufactures, distributes, and services
  diesel and natural gas engines, electric and hybrid powertrains, electrified power
  systems, components such as filtration, aftertreatment, turbochargers, fuel systems,
  controls systems, air handling systems, automated transmissions, and electric power
  generation systems. Cummins serves customers in approximately 190 countries and territories
  through a network of more than 600 company-owned and independent distributor locations
  and approximately 7,200 dealer locations.
